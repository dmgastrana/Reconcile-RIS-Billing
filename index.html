<!DOCTYPE html>
<html>
<head>
  <title>Reconciliation Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      background: white;
      padding: 30px;
      width: 600px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .upload-btn {
      width: 100%;
      padding: 12px;
      background: #6b7280;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .upload-btn:hover {
      background: #4b5563;
    }

    input[type="file"] {
      display: none;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1e40af;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
      color: #333;
    }

    #passwordSection {
      text-align: center;
    }

    #passwordInput {
      width: 80%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #errorMsg {
      color: red;
      margin-top: 10px;
    }

    #reconcileSection {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- PASSWORD SCREEN -->
  <div id="passwordSection">
    <h2>Enter Password</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Submit</button>
    <div id="errorMsg"></div>
  </div>

  <!-- RECONCILIATION UI -->
  <div id="reconcileSection">

    <h2>Reconciliation</h2>

    <label class="upload-btn" for="fileA">Upload Billing Charge Report</label>
    <input type="file" id="fileA">

    <label class="upload-btn" for="fileB">Upload Abbadox RIS Procedure Report</label>
    <input type="file" id="fileB">

    <button onclick="runReconciliation()">Reconcile</button>

    <div id="status"></div>

  </div>

</div>

<script>
/* PASSWORD */
const CORRECT_PASSWORD = "dmg1129";

function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    const error = document.getElementById("errorMsg");

    if (input === CORRECT_PASSWORD) {
        document.getElementById("passwordSection").style.display = "none";
        document.getElementById("reconcileSection").style.display = "block";
    } else {
        error.textContent = "Incorrect password";
    }
}

async function readExcel(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: "array" });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            resolve(XLSX.utils.sheet_to_json(sheet));
        };
        reader.readAsArrayBuffer(file);
    });
}

async function runReconciliation() {
    const fileA = document.getElementById("fileA").files[0]; // Billing
    const fileB = document.getElementById("fileB").files[0]; // RIS

    if (!fileA || !fileB) {
        alert("Please upload both files.");
        return;
    }

    document.getElementById("status").innerText = "Processing...";

    const billingRows = await readExcel(fileA);
    const risRows = await readExcel(fileB);

    // Normalize values
    const normalize = (val) => {
        if (val === undefined || val === null) return "";
        return String(val)
            .trim()
            .replace(/^0+/, "")
            .replace(/\s+/g, "");
    };

    // Build Billing map: Order Num → Billing row
    const billingMap = {};
    billingRows.forEach(row => {
        const orderNum = normalize(row["Order Num"]);
        if (orderNum) billingMap[orderNum] = row;
    });

    const matches = [];
    const noMatch = [];

    // RIS-driven matching
    risRows.forEach(risRow => {
        const acc = normalize(risRow["Accession Number"]);

        if (acc && billingMap[acc]) {
            // Side-by-side: RIS left, Billing right
            matches.push({
                ...risRow,
                ...billingMap[acc]
            });
        } else {
            // NO MATCH = RIS row only
            noMatch.push(risRow);
        }
    });

    // MATCH file
    if (matches.length > 0) {
        const wsMatch = XLSX.utils.json_to_sheet(matches);
        const wbMatch = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wbMatch, wsMatch, "Matches");
        XLSX.writeFile(wbMatch, "matched_side_by_side.xlsx");
    }

    // NO MATCH file (RIS rows only)
    if (noMatch.length > 0) {
        const wsNoMatch = XLSX.utils.json_to_sheet(noMatch);
        const wbNoMatch = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wbNoMatch, wsNoMatch, "RIS_No_Match");
        XLSX.writeFile(wbNoMatch, "ris_no_match.xlsx");
    }

    document.getElementById("status").innerText =
        "MATCH (RIS left + Billing right) and RIS NO MATCH files generated!";
}
</script>

</body>
</html>
