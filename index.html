<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RIS–Billing Reconciliation</title>

    <!-- SheetJS (Excel reader/writer) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- Reconciliation logic -->
    <script src="reconcile.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f7f7f7;
        }
        h2 {
            margin-bottom: 10px;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 600px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            font-weight: bold;
        }
        input[type="file"] {
            margin-top: 6px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover {
            background: #005fa3;
        }
        pre {
            background: #222;
            color: #0f0;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            width: 600px;
            overflow-x: auto;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>RIS–Billing Reconciliation Tool</h2>

        <label>Upload RIS File (Sheet: "RIS - Appointment Procedure Sum")</label><br>
        <input type="file" id="risFile" accept=".xlsx,.xls,.csv"><br>

        <label>Upload Billing File (Sheet: "Report_ChargeTransactionDetail")</label><br>
        <input type="file" id="billingFile" accept=".xlsx,.xls,.csv"><br>

        <button id="runBtn">Run Reconciliation</button>

        <pre id="summary">Summary will appear here…</pre>
    </div>

</body>
</html>
